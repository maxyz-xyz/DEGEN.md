name: Sync DO App Spec

on:
  push:
    branches: [main]
    paths: ['.do/app.yaml']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl apps update 9b9e71a4-d8cc-46ad-8cc1-4f2e9878314b --spec .do/app.yaml
